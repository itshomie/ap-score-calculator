<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AP Score Calculator preview</title>
  <desc id="desc">A branded preview image for APScoreCalculator.app showing a practice score estimate interface.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6fbff"/>
      <stop offset="0.58" stop-color="#eef7f0"/>
      <stop offset="1" stop-color="#fff7ea"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#15324a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="78" y="74" width="1044" height="482" rx="28" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="78" y="74" width="1044" height="92" rx="28" fill="#183b56"/>
  <rect x="78" y="132" width="1044" height="34" fill="#183b56"/>
  <g transform="translate(122 104)">
    <rect x="0" y="0" width="18" height="46" rx="5" fill="#2fb344"/>
    <rect x="28" y="12" width="18" height="34" rx="5" fill="#f59f00"/>
    <rect x="56" y="-8" width="18" height="54" rx="5" fill="#1c7ed6"/>
    <rect x="84" y="20" width="18" height="26" rx="5" fill="#e03131"/>
  </g>
  <text x="250" y="132" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800" fill="#ffffff">AP Score Calculator</text>
  <text x="122" y="238" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#183b56">Estimate AP practice scores from raw MCQ and FRQ results</text>
  <text x="122" y="288" font-family="Inter, Arial, sans-serif" font-size="22" fill="#526373">Private browser-based calculator with subject presets and score ranges.</text>
  <g transform="translate(122 348)">
    <rect x="0" y="0" width="240" height="112" rx="18" fill="#edf7f1"/>
    <text x="28" y="43" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#2f5d42">Subject preset</text>
    <text x="28" y="80" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#183b56">AP Biology</text>
    <rect x="276" y="0" width="240" height="112" rx="18" fill="#eef4ff"/>
    <text x="304" y="43" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#335d93">Composite</text>
    <text x="304" y="80" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#183b56">72.4 / 100</text>
    <rect x="552" y="0" width="240" height="112" rx="18" fill="#fff4db"/>
    <text x="580" y="43" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#8c6117">Estimate</text>
    <text x="580" y="82" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="900" fill="#183b56">4</text>
  </g>
  <rect x="122" y="500" width="772" height="14" rx="7" fill="#dfe7ee"/>
  <rect x="122" y="500" width="560" height="14" rx="7" fill="#2fb344"/>
  <text x="122" y="548" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#526373">Independent study tool. Not affiliated with College Board.</text>
</svg>
